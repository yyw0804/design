<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지뢰 찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #e94560;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    select, button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
    }

    select {
      background: #16213e;
      color: #eee;
      border: 1px solid #e94560;
    }

    button {
      background: #e94560;
      color: #fff;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover { background: #c73652; }

    .info-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 14px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .info-bar span { color: #e94560; }

    .board-wrap {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #board {
      display: grid;
      gap: 3px;
    }

    .cell {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: #0f3460;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.revealed):not(.flagged) {
      background: #1a4a80;
      transform: scale(1.08);
    }

    .cell.revealed {
      background: #0a2040;
      cursor: default;
    }

    .cell.flagged { background: #2a1a40; }

    .cell.mine-hit { background: #e94560; }

    .cell.mine-show { background: #1a1a2e; }

    .n1 { color: #4fc3f7; }
    .n2 { color: #81c784; }
    .n3 { color: #e57373; }
    .n4 { color: #9575cd; }
    .n5 { color: #ff8a65; }
    .n6 { color: #4dd0e1; }
    .n7 { color: #f06292; }
    .n8 { color: #aaa; }

    #message {
      margin-top: 16px;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 32px;
      color: #ffd700;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>💣 지뢰 찾기</h1>

<div class="controls">
  <select id="difficulty">
    <option value="easy">쉬움 (9×9, 지뢰 10개)</option>
    <option value="medium" selected>보통 (16×16, 지뢰 40개)</option>
    <option value="hard">어려움 (16×30, 지뢰 99개)</option>
  </select>
  <button onclick="startGame()">새 게임</button>
</div>

<div class="info-bar">
  <div>💣 <span id="mineCount">0</span></div>
  <div>🚩 <span id="flagCount">0</span></div>
  <div>⏱ <span id="timer">0</span>s</div>
</div>

<div class="board-wrap">
  <div id="board"></div>
</div>

<div id="message"></div>

<script>
  const CONFIGS = {
    easy:   { rows: 9,  cols: 9,  mines: 10 },
    medium: { rows: 16, cols: 16, mines: 40 },
    hard:   { rows: 16, cols: 30, mines: 99 },
  };

  let rows, cols, totalMines;
  let board, revealed, flagged, minePos;
  let gameOver, firstClick;
  let timerInterval, seconds;
  let flagsUsed;

  function startGame() {
    const diff = document.getElementById('difficulty').value;
    ({ rows, cols, mines: totalMines } = CONFIGS[diff]);

    board     = Array.from({ length: rows }, () => Array(cols).fill(0));
    revealed  = Array.from({ length: rows }, () => Array(cols).fill(false));
    flagged   = Array.from({ length: rows }, () => Array(cols).fill(false));
    minePos   = new Set();
    gameOver  = false;
    firstClick = true;
    flagsUsed  = 0;
    seconds    = 0;

    clearInterval(timerInterval);
    document.getElementById('timer').textContent = '0';
    document.getElementById('mineCount').textContent = totalMines;
    document.getElementById('flagCount').textContent = '0';
    document.getElementById('message').textContent = '';

    renderBoard();
  }

  function placeMines(excludeR, excludeC) {
    const excluded = new Set();
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        const nr = excludeR + dr, nc = excludeC + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
          excluded.add(nr * cols + nc);
      }

    while (minePos.size < totalMines) {
      const pos = Math.floor(Math.random() * rows * cols);
      if (!excluded.has(pos)) minePos.add(pos);
    }

    for (const pos of minePos) {
      const r = Math.floor(pos / cols), c = pos % cols;
      board[r][c] = -1;
    }

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (board[r][c] === -1) continue;
        let count = 0;
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1)
              count++;
          }
        board[r][c] = count;
      }
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.style.gridTemplateColumns = `repeat(${cols}, 36px)`;
    el.innerHTML = '';

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', onLeftClick);
        cell.addEventListener('contextmenu', onRightClick);
        el.appendChild(cell);
      }
  }

  function updateCell(r, c) {
    const el = document.getElementById('board');
    const idx = r * cols + c;
    const cell = el.children[idx];
    cell.className = 'cell';
    cell.textContent = '';

    if (flagged[r][c]) {
      cell.classList.add('flagged');
      cell.textContent = '🚩';
    } else if (!revealed[r][c]) {
      // unrevealed default style
    } else if (board[r][c] === -1) {
      cell.classList.add('mine-show');
      cell.textContent = '💣';
    } else {
      cell.classList.add('revealed');
      if (board[r][c] > 0) {
        cell.textContent = board[r][c];
        cell.classList.add(`n${board[r][c]}`);
      }
    }
  }

  function onLeftClick(e) {
    if (gameOver) return;
    const r = +e.currentTarget.dataset.r;
    const c = +e.currentTarget.dataset.c;
    if (revealed[r][c] || flagged[r][c]) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = seconds;
      }, 1000);
    }

    reveal(r, c);
    checkWin();
  }

  function onRightClick(e) {
    e.preventDefault();
    if (gameOver) return;
    const r = +e.currentTarget.dataset.r;
    const c = +e.currentTarget.dataset.c;
    if (revealed[r][c]) return;

    flagged[r][c] = !flagged[r][c];
    flagsUsed += flagged[r][c] ? 1 : -1;
    document.getElementById('flagCount').textContent = flagsUsed;
    updateCell(r, c);
  }

  function reveal(r, c) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    if (revealed[r][c] || flagged[r][c]) return;

    revealed[r][c] = true;

    if (board[r][c] === -1) {
      const el = document.getElementById('board');
      const cell = el.children[r * cols + c];
      cell.className = 'cell mine-hit';
      cell.textContent = '💣';
      endGame(false);
      return;
    }

    updateCell(r, c);

    if (board[r][c] === 0) {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          reveal(r + dr, c + dc);
    }
  }

  function endGame(win) {
    gameOver = true;
    clearInterval(timerInterval);

    for (const pos of minePos) {
      const r = Math.floor(pos / cols), c = pos % cols;
      if (!revealed[r][c]) {
        revealed[r][c] = true;
        updateCell(r, c);
      }
    }

    document.getElementById('message').textContent = win
      ? `🎉 성공! ${seconds}초 만에 클리어!`
      : '💥 지뢰를 밟았습니다! 다시 도전해보세요.';
  }

  function checkWin() {
    let unrevealedSafe = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (!revealed[r][c] && board[r][c] !== -1)
          unrevealedSafe++;

    if (unrevealedSafe === 0) endGame(true);
  }

  startGame();
</script>
</body>
</html>
